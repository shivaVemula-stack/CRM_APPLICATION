<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Add / Update Customer</title>

    <style>
        body {
            font-family: "Poppins", "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #d1fae5, #ecfdf5);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 70px auto;
            background: #ffffff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            animation: fadeIn 0.7s ease-in-out;
            border-top: 6px solid #10b981;
        }

        h3 {
            text-align: center;
            color: #065f46;
            margin-bottom: 25px;
            font-size: 26px;
            letter-spacing: 0.5px;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: #1f2933;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d1fae5;
            outline: none;
            font-size: 14px;
            transition: 0.2s ease;
            margin-bottom: 18px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.2);
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            gap: 10px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s ease;
            box-shadow: 0 5px 12px rgba(16, 185, 129, 0.35);
            flex: 1;
        }

        .btn-submit:hover {
            transform: scale(1.06);
            box-shadow: 0 8px 18px rgba(16, 185, 129, 0.45);
        }

        .btn-cancel {
            background: linear-gradient(135deg, #64748b, #475569);
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.25s ease;
            box-shadow: 0 5px 12px rgba(71, 85, 105, 0.35);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .btn-cancel:hover {
            transform: scale(1.06);
            box-shadow: 0 8px 18px rgba(71, 85, 105, 0.45);
        }

        .form-section {
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .container {
                margin: 30px auto;
                padding: 25px;
            }

            h3 {
                font-size: 22px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn-submit, .btn-cancel {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h3 th:text="${customer.id != null} ? 'Update Customer' : 'Add New Customer'">Customer Details</h3>

    <form th:action="@{/registerCustomer}" th:object="${customer}" method="POST">

        <!-- Hidden ID for update -->
        <input type="hidden" th:field="*{id}" />

        <div class="form-section">
            <label>Customer Name</label>
            <input type="text" th:field="*{name}" placeholder="Enter customer name" required />
        </div>

        <div class="form-section">
            <label>Email Address</label>
            <input type="email" th:field="*{email}" placeholder="Enter email address" required />
        </div>

        <div class="form-section">
            <label>Phone Number</label>
            <input type="tel" th:field="*{phone}" placeholder="Enter phone number" />
        </div>

        <div class="form-section">
            <label>Address</label>
            <input type="text" th:field="*{address}" placeholder="Enter customer address" />
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-submit" th:text="${customer.id != null} ? 'Update Customer' : 'Save Customer'">Save Customer</button>
            <a th:href="@{/customerlist}" class="btn-cancel">Cancel</a>
        </div>

    </form>

</div>

</body>

</html>
